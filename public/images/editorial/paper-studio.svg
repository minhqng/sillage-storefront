<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Paper studio still life</title>
  <desc id="desc">Layered paper composition with warm daylight and restrained shadows.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f1e8" />
      <stop offset="100%" stop-color="#e4d7c7" />
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcfaf6" />
      <stop offset="100%" stop-color="#efe5d8" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)" />
  <circle cx="1240" cy="180" r="170" fill="#efe3d0" opacity="0.85" />
  <rect x="220" y="200" width="1160" height="760" rx="36" fill="#efe5d7" opacity="0.55" />
  <g transform="rotate(-10 700 550)">
