    <rect x="430" y="420" width="520" height="18" rx="9" fill="#c1aa8c" opacity="0.42" />
    <rect x="430" y="476" width="620" height="18" rx="9" fill="#c1aa8c" opacity="0.32" />
    <rect x="430" y="532" width="470" height="18" rx="9" fill="#c1aa8c" opacity="0.26" />
  </g>
  <path d="M1110 330c40 60 86 170 116 274 18 66 42 154 74 220" fill="none" stroke="#cfb89a" stroke-linecap="round" stroke-width="22" opacity="0.6" />
  <text x="225" y="1080" fill="#7b6750" font-family="Georgia, serif" font-size="34" letter-spacing="7">SILLAGE PAPER AND LIGHT</text>
