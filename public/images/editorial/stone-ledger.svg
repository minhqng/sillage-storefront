<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Stone ledger still life</title>
  <desc id="desc">Neutral editorial composition with stone, paper, and soft shadow.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4ede3" />
      <stop offset="100%" stop-color="#ddd2c3" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)" />
  <ellipse cx="280" cy="200" rx="220" ry="120" fill="#efe4d5" filter="url(#blur)" opacity="0.8" />
  <ellipse cx="1250" cy="250" rx="260" ry="150" fill="#d4c3ae" filter="url(#blur)" opacity="0.6" />
  <rect x="180" y="680" width="1240" height="320" rx="32" fill="#c8b8a1" opacity="0.22" />
  <g transform="rotate(-8 620 560)">
    <rect x="360" y="250" width="760" height="520" rx="24" fill="#fbf7f1" />
    <rect x="430" y="320" width="620" height="380" rx="18" fill="#f0e7db" />
    <rect x="500" y="390" width="480" height="18" rx="9" fill="#c5b39c" opacity="0.55" />
    <rect x="500" y="450" width="360" height="18" rx="9" fill="#c5b39c" opacity="0.38" />
    <rect x="500" y="510" width="420" height="18" rx="9" fill="#c5b39c" opacity="0.3" />
  </g>
  <rect x="980" y="360" width="250" height="360" rx="32" fill="#e7dac9" />
  <rect x="1015" y="400" width="180" height="16" rx="8" fill="#b49a7d" opacity="0.45" />
  <rect x="1015" y="442" width="150" height="16" rx="8" fill="#b49a7d" opacity="0.35" />
  <text x="210" y="1080" fill="#76624c" font-family="Georgia, serif" font-size="34" letter-spacing="7">SILLAGE MATERIAL STUDY</text>
</svg>
