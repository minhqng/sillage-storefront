<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Cedar Ink bottle portrait</title>
  <desc id="desc">Smoked wood fragrance bottle rendered as a premium editorial illustration.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e7e5" />
      <stop offset="100%" stop-color="#9f9b98" />
    </linearGradient>
    <linearGradient id="juice" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6c6763" />
      <stop offset="100%" stop-color="#3a3736" />
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="36" /></filter>
  </defs>
  <rect width="1200" height="1500" fill="url(#bg)" />
  <ellipse cx="280" cy="240" rx="220" ry="140" fill="#f7f4f0" opacity="0.8" filter="url(#blur)" />
  <ellipse cx="930" cy="330" rx="250" ry="170" fill="#cbc5c0" opacity="0.5" filter="url(#blur)" />
  <rect x="0" y="1160" width="1200" height="340" fill="#d5cfca" opacity="0.76" />
  <ellipse cx="600" cy="1178" rx="250" ry="56" fill="#444140" opacity="0.16" />
  <g transform="translate(330 160)">
    <rect x="164" y="0" width="212" height="118" rx="24" fill="#181717" />
    <rect x="184" y="96" width="172" height="66" rx="24" fill="#2c2a2a" />
    <rect x="76" y="142" width="388" height="860" rx="52" fill="#f1efec" opacity="0.92" />
    <rect x="102" y="172" width="336" height="800" rx="42" fill="url(#juice)" opacity="0.92" />
    <rect x="134" y="434" width="272" height="204" rx="18" fill="#f2efe9" opacity="0.94" />
    <text x="270" y="500" fill="#34312f" font-family="Georgia, serif" font-size="34" letter-spacing="10" text-anchor="middle">SILLAGE</text>
    <text x="270" y="562" fill="#514d49" font-family="Georgia, serif" font-size="48" letter-spacing="5" text-anchor="middle">CEDAR INK</text>
    <text x="270" y="606" fill="#6a6763" font-family="Arial, sans-serif" font-size="18" letter-spacing="4" text-anchor="middle">EAU DE PARFUM</text>
  </g>
</svg>
