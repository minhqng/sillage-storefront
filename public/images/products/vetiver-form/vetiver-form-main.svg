<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Vetiver Form bottle portrait</title>
  <desc id="desc">Dry green vetiver fragrance bottle rendered as a premium editorial illustration.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecefe7" />
      <stop offset="100%" stop-color="#98a28c" />
    </linearGradient>
    <linearGradient id="juice" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7f8970" />
      <stop offset="100%" stop-color="#4a5345" />
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="36" /></filter>
  </defs>
  <rect width="1200" height="1500" fill="url(#bg)" />
  <ellipse cx="280" cy="240" rx="220" ry="140" fill="#f6fbef" opacity="0.82" filter="url(#blur)" />
  <ellipse cx="930" cy="330" rx="250" ry="170" fill="#c9d0bf" opacity="0.55" filter="url(#blur)" />
  <rect x="0" y="1160" width="1200" height="340" fill="#d9ddd3" opacity="0.76" />
  <ellipse cx="600" cy="1178" rx="250" ry="56" fill="#4a5344" opacity="0.14" />
  <g transform="translate(330 160)">
    <rect x="164" y="0" width="212" height="118" rx="24" fill="#1c211b" />
    <rect x="184" y="96" width="172" height="66" rx="24" fill="#31382f" />
    <rect x="76" y="142" width="388" height="860" rx="52" fill="#f4f6f0" opacity="0.92" />
    <rect x="102" y="172" width="336" height="800" rx="42" fill="url(#juice)" opacity="0.88" />
    <rect x="134" y="434" width="272" height="204" rx="18" fill="#f2efe8" opacity="0.95" />
    <text x="270" y="500" fill="#33392f" font-family="Georgia, serif" font-size="34" letter-spacing="10" text-anchor="middle">SILLAGE</text>
    <text x="270" y="562" fill="#525a48" font-family="Georgia, serif" font-size="46" letter-spacing="5" text-anchor="middle">VETIVER FORM</text>
    <text x="270" y="606" fill="#6b735f" font-family="Arial, sans-serif" font-size="18" letter-spacing="4" text-anchor="middle">EAU DE PARFUM</text>
  </g>
</svg>
