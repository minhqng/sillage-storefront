<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Discovery Set portrait</title>
  <desc id="desc">Boxed discovery set with miniature vials rendered as a premium editorial illustration.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5efe6" />
      <stop offset="100%" stop-color="#cfc0ad" />
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f2ea" />
      <stop offset="100%" stop-color="#e3d6c6" />
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="36" /></filter>
