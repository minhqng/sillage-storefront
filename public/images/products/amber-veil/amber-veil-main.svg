<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Amber Veil bottle portrait</title>
  <desc id="desc">Warm amber-toned fragrance bottle rendered as a premium editorial illustration.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e9dc" />
      <stop offset="100%" stop-color="#cfb18a" />
    </linearGradient>
    <linearGradient id="juice" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c78549" />
      <stop offset="100%" stop-color="#81512f" />
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="36" /></filter>
  </defs>
  <rect width="1200" height="1500" fill="url(#bg)" />
  <ellipse cx="280" cy="240" rx="220" ry="140" fill="#fff4e5" opacity="0.85" filter="url(#blur)" />
  <ellipse cx="930" cy="310" rx="250" ry="170" fill="#e6c49d" opacity="0.5" filter="url(#blur)" />
  <rect x="0" y="1160" width="1200" height="340" fill="#e6d6c0" opacity="0.7" />
  <ellipse cx="600" cy="1178" rx="250" ry="56" fill="#806046" opacity="0.14" />
  <g transform="translate(330 160)">
    <rect x="164" y="0" width="212" height="118" rx="24" fill="#241a18" />
    <rect x="184" y="96" width="172" height="66" rx="24" fill="#3b2d28" />
    <rect x="76" y="142" width="388" height="860" rx="52" fill="#faf4ec" opacity="0.92" />
    <rect x="102" y="172" width="336" height="800" rx="42" fill="url(#juice)" opacity="0.88" />
    <rect x="134" y="434" width="272" height="204" rx="18" fill="#f6ede2" opacity="0.95" />
    <text x="270" y="500" fill="#3b2b22" font-family="Georgia, serif" font-size="34" letter-spacing="10" text-anchor="middle">SILLAGE</text>
    <text x="270" y="562" fill="#6c523d" font-family="Georgia, serif" font-size="48" letter-spacing="5" text-anchor="middle">AMBER VEIL</text>
    <text x="270" y="606" fill="#75624f" font-family="Arial, sans-serif" font-size="18" letter-spacing="4" text-anchor="middle">EAU DE PARFUM</text>
  </g>
</svg>
