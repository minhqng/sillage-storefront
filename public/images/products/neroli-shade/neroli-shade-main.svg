<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Neroli Shade bottle portrait</title>
  <desc id="desc">Citrus floral fragrance bottle rendered as a premium editorial illustration.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f2e8" />
      <stop offset="100%" stop-color="#d5c39a" />
    </linearGradient>
    <linearGradient id="juice" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8c178" />
      <stop offset="100%" stop-color="#8c7641" />
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="36" /></filter>
  </defs>
  <rect width="1200" height="1500" fill="url(#bg)" />
  <ellipse cx="280" cy="230" rx="220" ry="140" fill="#fffaf0" opacity="0.82" filter="url(#blur)" />
  <ellipse cx="930" cy="320" rx="250" ry="170" fill="#eadcae" opacity="0.52" filter="url(#blur)" />
  <rect x="0" y="1160" width="1200" height="340" fill="#ebdfc0" opacity="0.74" />
  <ellipse cx="600" cy="1178" rx="250" ry="56" fill="#7a6942" opacity="0.14" />
  <g transform="translate(330 160)">
    <rect x="164" y="0" width="212" height="118" rx="24" fill="#23201a" />
    <rect x="184" y="96" width="172" height="66" rx="24" fill="#3a3428" />
    <rect x="76" y="142" width="388" height="860" rx="52" fill="#f9f5ec" opacity="0.92" />
    <rect x="102" y="172" width="336" height="800" rx="42" fill="url(#juice)" opacity="0.88" />
    <rect x="134" y="434" width="272" height="204" rx="18" fill="#f7f0e2" opacity="0.95" />
    <text x="270" y="500" fill="#40372a" font-family="Georgia, serif" font-size="34" letter-spacing="10" text-anchor="middle">SILLAGE</text>
    <text x="270" y="562" fill="#766341" font-family="Georgia, serif" font-size="46" letter-spacing="5" text-anchor="middle">NEROLI SHADE</text>
    <text x="270" y="606" fill="#8c7951" font-family="Arial, sans-serif" font-size="18" letter-spacing="4" text-anchor="middle">EAU DE PARFUM</text>
  </g>
</svg>
